<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto GPS Masjid LED Clock</title>

<link href="https://fonts.cdnfonts.com/css/digital-7-mono" rel="stylesheet">

<style>
body{
  background:#111;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding-top:20px;
  height: 100%;
  width: 100%;
}

.container{
  width:320px;
  background:#000;
  padding:10px;
  border-radius:10px;
  text-align:center;
  color:white;
  box-shadow:0 0 20px #000;
  margin-bottom:20px;
}

.title{
  font-size:26px;
  margin-bottom:5px;
  color:cyan;
  text-shadow:0 0 10px cyan;
}

.city{
  font-size:18px;
  color:#ccc;
  margin-bottom:5px;
  text-shadow:0 0 10px #ccc;
}

.clock{
  font-family:'Digital-7 Mono';
  font-size:60px;
  color:red;
  text-shadow:0 0 20px red;
  margin-bottom:20px;
}

.table-container{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:10px;
}

.prayer-row{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-radius:8px;
  background:#222;
}

.time{
  width:120px;
  font-family:'Digital-7 Mono';
  font-size:28px;
  padding:5px 10px;
  border-radius:5px;
  color:red;
  background:#000;
  box-shadow:0 0 15px red;
  text-align:center;
}

.label{
  font-size:18px;
  align-self:center;
  background:#000;
  color:red;
  width:140px;
  border-radius:5px;
  box-shadow:0 0 15px red;
  text-align:center;
}

.active .time{ color:lime; box-shadow:0 0 20px lime; }
.next .time{ color:yellow; box-shadow:0 0 20px yellow; }

.date{
  height:30px;
  margin-top:15px;
  margin-bottom:20px;
  font-size:18px;
  color:red;
  background:#222;
  padding:10px;
  border-radius:8px;
  text-align:center;
  box-shadow:0 0 10px red;
}

.manual-row{
  display:flex;
  justify-content:space-between;
  padding:5px;
  border-radius:8px;
  background:#222;
  margin-top:10px;
  position:relative;
}

/* Hidden input for real typing */
.manual-hidden{
  position:absolute;
  opacity:0;
  pointer-events:auto;
}

/* LED style display */
.manual-display{
  width:145px;
  height:35px;
  line-height:50px;
  font-family:'Digital-7 Mono';
  font-size:28px;
  color:skyblue;
  background:#000;
  box-shadow:0 0 15px skyblue;
  border-radius:8px;
  text-align:center;
  display:flex;
  align-items:center;
  justify-content:center;
}

.manual-label{
  font-size:18px;
  align-self:center;
  background:#000;
  color:red;
  width:140px;
  border-radius:5px;
  box-shadow:0 0 15px red;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">
  <div class="title">نماز کے اوقات</div>
  <div class="city" id="cityName">لوکیشن معلوم کی جا رہی ہے...</div>
  <div class="clock" id="clock">00:00:00</div>
  <div class="table-container" id="prayerTable"></div>
  <div class="date" id="date"></div>
</div>

<script>
let prayerTimes={};

// Format 12-hour
function format12(time){
  time = time.split(" ")[0];
  let [h,m]=time.split(":");
  h=parseInt(h);
  let ampm=h>=12?"PM":"AM";
  h=h%12;
  if(h==0)h=12;
  return h.toString().padStart(2,'0')+":"+m+" "+ampm;
}

// Clock
function updateClock(){
  let now=new Date();
  let h=now.getHours();
  let m=now.getMinutes();
  let s=now.getSeconds();
  let ampm=h>=12?"PM":"AM";
  h=h%12;if(h==0)h=12;

  document.getElementById("clock").innerHTML=
  h.toString().padStart(2,'0')+":"+
  m.toString().padStart(2,'0')+":"+
  s.toString().padStart(2,'0')+" "+ampm;

  document.getElementById("date").innerHTML=
  now.toDateString()+" | Hijri: "+
  new Intl.DateTimeFormat('en-TN-u-ca-islamic').format(now);
}
setInterval(updateClock,1000);
updateClock();

// GPS location
function getLocation(){
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(position=>{
      let lat=position.coords.latitude;
      let lon=position.coords.longitude;
      loadPrayerTimes(lat,lon);
      getCityName(lat,lon);
    });
  }else{
    alert("GPS supported نہیں ہے");
  }
}

// Load prayer times
function loadPrayerTimes(lat,lon){
  fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=1&school=1`)
  .then(res=>res.json())
  .then(data=>{
    let t=data.data.timings;
    prayerTimes={
      "امساک":t.Imsak,
      "الفجر":t.Fajr,
      "سن رائز":t.Sunrise,
      "الظہر":t.Dhuhr,
      "العصر":t.Asr,
      "المغرب":t.Maghrib,
      "العشاء":t.Isha,
      "آدھی رات":t.Midnight,
      "آخری تہائی":t.Lastthird
    };
    renderPrayers();
  });
}

// City name
function getCityName(lat,lon){
  fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=ur`)
  .then(res=>res.json())
  .then(data=>{
    document.getElementById("cityName").innerHTML="موجودہ شہر: "+data.city;
  });
}

// Render prayers + manual inputs
function renderPrayers(){
  let html="";
  for(let name in prayerTimes){
    html+=`<div class="prayer-row" id="${name}">
      <div class="time">${format12(prayerTimes[name])}</div>
      <div class="label">${name}</div>
    </div>`;
  }

  // Manual Inputs (persistent)
  const manualNames=["fajr","zuhr","asr","maghrib","isha"];
  manualNames.forEach(name=>{
    let saved = localStorage.getItem(name) || "";
    let placeholder;
    switch(name){
      case "fajr": placeholder="05:30"; break;
      case "zuhr": placeholder="01:30"; break;
      case "asr": placeholder="04:45"; break;
      case "maghrib": placeholder="06:15"; break;
      case "isha": placeholder="08:00"; break;
    }
    html+=`
    <div class="manual-row">
      <div class="manual-display" id="${name}Display">${saved || placeholder}</div>
      <input type="text" class="manual-hidden" id="${name}J" placeholder="${placeholder}">
      <div class="manual-label">${name==="fajr"?"فجر":name==="zuhr"?"ظہر":name==="asr"?"عصر":name==="maghrib"?"مغرب":"عشاء"} جماعت</div>
    </div>`;
  });

  document.getElementById("prayerTable").innerHTML=html;

  // Add input event listeners for persistence
  setTimeout(()=>{
    manualNames.forEach(name=>{
      const input = document.getElementById(name+"J");
      const display = document.getElementById(name+"Display");
      if(input && display){
        // Initialize display
        display.innerText = input.value || localStorage.getItem(name) || input.placeholder;

        // Event listener
        input.addEventListener("input", ()=>{
          display.innerText = input.value;
          localStorage.setItem(name, input.value);
        });
      }
    });
  },100);
}

// Update active / next prayer
function updatePrayerStatus(){
  let now=new Date();
  let current=now.getHours()*60+now.getMinutes();
  let keys=Object.keys(prayerTimes);
  let nextIndex=null;

  for(let i=0;i<keys.length;i++){
    let time=prayerTimes[keys[i]].split(" ")[0];
    let [h,m]=time.split(":");
    let minutes=parseInt(h)*60+parseInt(m);
    let row=document.getElementById(keys[i]);
    if(!row) return;
    row.classList.remove("active","next");

    if(current>=minutes && (i===keys.length-1 || current <
      (parseInt(prayerTimes[keys[i+1]].split(":")[0])*60+
       parseInt(prayerTimes[keys[i+1]].split(":")[1])))){
      row.classList.add("active");
    } else if(nextIndex===null && current<minutes){
      nextIndex=i;
    }
  }

  if(nextIndex!==null){
    document.getElementById(keys[nextIndex]).classList.add("next");
  }
}

setInterval(updatePrayerStatus,1000);
getLocation();
</script>
</body>
</html>
