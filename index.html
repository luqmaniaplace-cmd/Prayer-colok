<!--   Auto GPS Masjid LED Clock  -->
<!-- ============================= -->

<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>prayer 🤲 clock ⌚</title>

<!-- Digital LED Font -->
<link href="https://fonts.cdnfonts.com/css/digital-7-mono" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<!-- External CSS File -->
<link rel="stylesheet" href="style.css">


<!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- theme color -->
  <meta name="theme-color" content="#008000">

</head>
<body>
    <!-- ============================= -->
<!-- Inline Location Warning -->
<!-- ============================= -->
<div id="locationWarning" class="hidden">
  <p>📍 Location access is blocked for this site.</p>
  <p>Please enable location in your browser settings to continue.</p>
  <button onclick="retryLocation()">Check Again</button>
</div>

<!-- ====== Main Container ====== -->
<div class="container">

  <div class="title">Prayer Times</div>

  <!-- City Name -->
  <div class="city" id="cityName">
    Location is being determined...
  </div>

  <!-- Digital Clock -->
  <div class="clock" id="clock">00:00:00</div>

  <!-- Prayer Table -->
  <div class="table-container" id="prayerTable"></div>

  <!-- Date + Hijri -->
  <div class="date" id="date"></div>

</div>

<!-- External JavaScript File -->
<script src="script.js"></script>


<script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
      .then(() => console.log('Service Worker Registered'))
      .catch(err => console.log(err));
    }
  </script>


</body>
</html>
